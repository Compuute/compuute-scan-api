name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest / ruff / bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit

      - name: Lint (ruff)
        run: ruff check api/ main.py tests/

      - name: Security lint (bandit)
        run: bandit -r api/ main.py -ll -ii

      - name: Run tests
        run: pytest tests/ -v --tb=short
