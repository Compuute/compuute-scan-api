name: Release — SBOM + SLSA provenance

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.1)"
        required: true

permissions:
  contents: write       # upload release assets
  id-token: write       # OIDC for SLSA generator
  actions: read         # for SLSA generator to read workflow metadata

jobs:
  build:
    name: Build artifact + hash
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "cyclonedx-bom>=4,<6"

      - name: Generate CycloneDX SBOM
        run: bash scripts/sbom.sh

      - name: Create source tarball
        run: |
          REF="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          TARBALL="compuute-scan-api-${REF}.tar.gz"
          tar --exclude='.git' --exclude='venv' --exclude='__pycache__' \
              --exclude='.pytest_cache' -czf "$TARBALL" .
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Compute SHA-256 hashes (base64) for SLSA subjects
        id: hash
        run: |
          set -euo pipefail
          # SLSA generator expects: { "subjects": [ { "name": "...", "digest": {"sha256": "..."} } ] }
          # or base64-encoded sha256sum output. We use the latter.
          HASHES=$(sha256sum "$TARBALL" sbom.cdx.json | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$REF" "$TARBALL" sbom.cdx.json --clobber

  provenance:
    name: SLSA L3 provenance
    needs: [build]
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
